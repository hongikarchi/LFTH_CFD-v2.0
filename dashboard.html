<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LFTH_CFD Files</title>
<style>
:root {
  --bg: #f6f8fa;
  --panel: #ffffff;
  --border: #d0d7de;
  --border-soft: #eaeef2;
  --text: #1f2328;
  --text-soft: #57606a;
  --text-faint: #8c959f;
  --accent: #0969da;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}
code, .mono { font-family: var(--mono); }
header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 18px 28px 14px;
}
header .title {
  font-size: 19px;
  font-weight: 650;
  margin: 0 0 6px;
}
header .meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  font-size: 12.5px;
  color: var(--text-soft);
}
header .chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg);
  border: 1px solid var(--border-soft);
  border-radius: 999px;
  padding: 2px 9px;
}
header .chip b { color: var(--text); font-weight: 600; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 22px 28px 60px; }
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.section-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.search {
  width: min(360px, 100%);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 9px;
  font-family: var(--mono);
  font-size: 12.5px;
  background: var(--panel);
  color: var(--text);
}
.tree-wrap {
  font-family: var(--mono);
  font-size: 12.5px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  overflow-x: auto;
}
.tree-line {
  display: grid;
  grid-template-columns: minmax(360px, max-content) minmax(280px, 1fr);
  gap: 18px;
  padding: 4px 0;
  align-items: baseline;
  border-bottom: 1px solid transparent;
}
.tree-line:hover { border-bottom-color: var(--border-soft); }
.tree-line .path { color: var(--text); white-space: pre; }
.tree-line .path .seg-dir { color: var(--accent); font-weight: 650; }
.tree-line .path .seg-file { color: var(--text); }
.tree-line .path .branch { color: var(--text-faint); }
.tree-line .role {
  color: var(--text-soft);
  font-family: var(--sans);
  font-size: 12.5px;
  line-height: 1.4;
}
.empty {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-soft);
  padding: 14px 16px;
}
@media (max-width: 720px) {
  header { padding: 16px 18px 12px; }
  .wrap { padding: 18px 16px 44px; }
  .toolbar { align-items: stretch; flex-direction: column; }
  .search { width: 100%; }
  .tree-line { grid-template-columns: minmax(280px, max-content); gap: 3px; }
}
</style>
</head>
<body>
<header>
  <h1 class="title">LFTH_CFD Files</h1>
  <div class="meta">
    <span class="chip">port <b class="mono">8080</b></span>
    <span class="chip">role <b>main dashboard</b></span>
    <span class="chip">view <b>Files</b></span>
  </div>
</header>

<main class="wrap">
  <div class="toolbar">
    <div class="section-title">Project structure</div>
    <input class="search" id="file_search" placeholder="filter paths or roles">
  </div>
  <div id="file_list" class="empty">Loading files...</div>
</main>

<script>
let ALL_FILES = [];

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function buildTree(files) {
  const root = {children: new Map(), role: null};
  for (const file of files) {
    const parts = file.path.split('/').filter(Boolean);
    let node = root;
    for (let i = 0; i < parts.length; i++) {
      const segment = parts[i];
      if (!node.children.has(segment)) {
        node.children.set(segment, {children: new Map(), role: null});
      }
      node = node.children.get(segment);
      if (i === parts.length - 1) node.role = file.role;
    }
  }
  return root;
}

function renderTree(files) {
  if (!files.length) {
    return '<div class="empty">No matching files.</div>';
  }

  const root = buildTree(files);
  const lines = [
    '<div class="tree-line"><div class="path"><span class="seg-dir">LFTH_CFD v2.0/</span></div><div class="role">project root</div></div>'
  ];

  function walk(node, prefix, isLast, name, depth) {
    if (depth >= 0) {
      const branch = depth === 0 ? '' : (isLast ? '`-- ' : '+-- ');
      const isDir = node.children.size > 0;
      const segmentClass = isDir ? 'seg-dir' : 'seg-file';
      const displayName = name + (isDir ? '/' : '');
      const path = '<span class="branch">' + esc(prefix + branch) + '</span>' +
                   '<span class="' + segmentClass + '">' + esc(displayName) + '</span>';
      lines.push(
        '<div class="tree-line"><div class="path">' + path + '</div><div class="role">' +
        esc(node.role || '') + '</div></div>'
      );
    }

    const children = Array.from(node.children.entries());
    children.sort(([aName, aNode], [bName, bNode]) => {
      const aDir = aNode.children.size > 0;
      const bDir = bNode.children.size > 0;
      if (aDir !== bDir) return aDir ? -1 : 1;
      return aName.localeCompare(bName);
    });

    children.forEach(([childName, childNode], index) => {
      const childIsLast = index === children.length - 1;
      const nextPrefix = depth < 0 ? '' : prefix + (isLast ? '    ' : '|   ');
      walk(childNode, nextPrefix, childIsLast, childName, depth + 1);
    });
  }

  walk(root, '', true, 'LFTH_CFD v2.0', -1);
  return '<div class="tree-wrap">' + lines.join('') + '</div>';
}

function applyFilter() {
  const query = document.getElementById('file_search').value.trim().toLowerCase();
  const filtered = query
    ? ALL_FILES.filter(file => (file.path + ' ' + file.role).toLowerCase().includes(query))
    : ALL_FILES;
  document.getElementById('file_list').innerHTML = renderTree(filtered);
}

async function loadFiles() {
  const response = await fetch('/api/structure');
  if (!response.ok) throw new Error('structure API failed: ' + response.status);
  const data = await response.json();
  ALL_FILES = data.files || [];
  applyFilter();
}

document.getElementById('file_search').addEventListener('input', applyFilter);
loadFiles().catch(error => {
  document.getElementById('file_list').innerHTML =
    '<div class="empty">Failed to load files: ' + esc(error.message || error) + '</div>';
});
</script>
</body>
</html>
